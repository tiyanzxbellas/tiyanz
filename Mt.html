<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanzzApi - Sedang Pemeliharaan</title>
    
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Menggunakan Font Google 'Space Grotesk' untuk kesan futuristik/tech -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #030712; /* gray-950 */
            color: #f9fafb;
            overflow: hidden; /* Mencegah scroll karena ada canvas animasi */
        }

        /* Efek cahaya/neon untuk teks utama */
        .glow-text {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4), 0 0 40px rgba(56, 189, 248, 0.2);
        }

        /* Animasi garis loading (progress bar) */
        @keyframes loading-stripes {
            0% { background-position: 1rem 0; }
            100% { background-position: 0 0; }
        }
        .progress-bar {
            background-image: linear-gradient(
                45deg,
                rgba(255,255,255,0.15) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255,255,255,0.15) 50%,
                rgba(255,255,255,0.15) 75%,
                transparent 75%,
                transparent
            );
            background-size: 1rem 1rem;
            animation: loading-stripes 1s linear infinite;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center">

    <!-- Canvas untuk latar belakang animasi jaringan (network) -->
    <canvas id="networkCanvas" class="absolute inset-0 w-full h-full z-0 opacity-40"></canvas>

    <!-- Konten Utama -->
    <main class="relative z-10 text-center px-6 max-w-3xl mx-auto flex flex-col items-center">
        
        <!-- Ikon Gear/Pengaturan Berputar -->
        <div class="relative mb-6 group">
            <div class="absolute inset-0 bg-sky-500 rounded-full blur-xl opacity-20 group-hover:opacity-40 transition-opacity duration-500"></div>
            <svg class="w-20 h-20 md:w-24 md:h-24 text-sky-400 animate-[spin_5s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </div>

        <!-- Judul API -->
        <h1 class="text-5xl md:text-7xl font-bold mb-2 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-600 glow-text">
            NanzzApi
        </h1>

        <!-- Status -->
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-sm font-semibold mb-6">
            <span class="relative flex h-2.5 w-2.5">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-sky-500"></span>
            </span>
            SISTEM OFFLINE
        </div>

        <h2 class="text-2xl md:text-3xl font-semibold mb-4 text-gray-200">
            Sedang Dalam Pemeliharaan
        </h2>

        <p class="text-gray-400 mb-10 text-base md:text-lg max-w-xl leading-relaxed">
            Kami sedang melakukan peningkatan server dan penambahan fitur baru untuk memastikan layanan NanzzApi berjalan lebih cepat dan stabil. Kami akan segera kembali mengudara!
        </p>

        <!-- Progress Bar (Simulasi) -->
        <div class="w-full max-w-md bg-gray-900 rounded-full h-3 mb-3 border border-gray-800 p-0.5 overflow-hidden shadow-inner">
            <div class="bg-gradient-to-r from-sky-500 to-blue-600 h-full rounded-full progress-bar relative" style="width: 78%">
                <div class="absolute inset-0 bg-white/20 rounded-full animate-pulse"></div>
            </div>
        </div>
        <p class="text-sm text-sky-400 font-mono mb-8 tracking-wider">
            [ <span id="progress-text">78</span>% ] MENGOPTIMALKAN DATABASE...
        </p>

        <!-- Kontak / Aksi -->
        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <button onclick="window.location.reload()" class="px-6 py-3 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium transition-all duration-200 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Coba Lagi
            </button>
            <a href="mailto:support@nanzzapi.com" class="px-6 py-3 rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-medium transition-all duration-200 shadow-[0_0_15px_rgba(2,132,199,0.5)] flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                Hubungi Support
            </a>
        </div>
        
    </main>

    <!-- Skrip untuk Animasi Latar Belakang Partikel / Jaringan -->
    <script>
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles;

        // Mengatur ukuran canvas sesuai layar
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // Kelas Partikel
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.radius = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Pantulkan jika menabrak dinding layar
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(56, 189, 248, 0.5)';
                ctx.fill();
            }
        }

        // Inisialisasi partikel
        function initParticles() {
            particles = [];
            // Sesuaikan jumlah partikel berdasarkan lebar layar
            let particleCount = Math.min(Math.floor(window.innerWidth / 15), 100);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // Loop animasi utama
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Update dan gambar semua partikel
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Gambar garis penghubung antar partikel yang berdekatan
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // Jarak maksimal untuk menarik garis
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.2 - distance/600})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // Event listener
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        // Simulasi perubahan persentase kecil-kecilan biar terkesan hidup
        setInterval(() => {
            let el = document.getElementById('progress-text');
            let current = parseInt(el.innerText);
            if(Math.random() > 0.5 && current < 95) {
                el.innerText = current + 1;
            }
        }, 5000);

        // Jalankan
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
